<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundi Gestão TI - Acesso Interno</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Browser Bar -->
    <div class="browser-bar">
        <div class="browser-buttons">
            <div class="browser-btn red"></div>
            <div class="browser-btn yellow"></div>
            <div class="browser-btn green"></div>
        </div>
        <div class="browser-url">
            https://mundi-gestao-ti.com.br/login
        </div>
    </div>

    <!-- Main Container -->
    <div class="login-container">
        <!-- Header -->
        <header class="login-header">
            <h1 class="main-title">MUNDI GESTÃO TI</h1>
            <p class="subtitle">PORTAL INTERNO DE FUNCIONÁRIO</p>
        </header>

        <!-- Logo -->  
    <div class="logo-section">
        <div class="logo-circle">
            <img src="LOGO.png" alt="Logo Mundi TI" class="logo-icon">
        </div>
    <p class="access-label">ACESSO INTERNO</p>
        </div>

        <!-- Login Form -->
        <div class="login-card">
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="login" class="form-label">LOGIN</label>
                    <input 
                        type="text" 
                        id="login" 
                        class="form-input" 
                        placeholder="Digite seu usuário"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="senha" class="form-label">SENHA</label>
                    <input 
                        type="password" 
                        id="senha" 
                        class="form-input" 
                        placeholder="Digite sua senha"
                        required
                    >
                </div>

                <div class="form-info">
                    <p>Esqueci Minha Senha</p>
                    
                    <p>Chave de Acesso</p>
                </div>

                <button type="submit" class="btn-entrar">
                    ENTRAR
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                        <polyline points="10 17 15 12 10 7"></polyline>
                        <line x1="15" y1="12" x2="3" y2="12"></line>
                    </svg>
                </button>
            </form>
        </div>

        <!-- Footer Warning -->
        <footer class="login-footer">
            <div class="warning-box">
                <svg class="warning-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <p>ACESSO RESTRITO SOMENTE FUNCIONÁRIOS AUTORIZADOS</p>
            </div>
        </footer>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'ex2.html';
        });
    </script>
</body>
</html>
